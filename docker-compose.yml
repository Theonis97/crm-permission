# PostgreSQL local pour le CRM (Prisma)
# Démarrage : docker compose up -d
# Arrêt     : docker compose down
# Données   : volume Docker "postgres_data" (persistant)

services:
  postgres:
    image: postgres:16-alpine
    container_name: crm-permissions-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: crm_intech
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
